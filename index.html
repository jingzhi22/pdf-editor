<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    #toolbar {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 100;
    }
    .sep { width: 1px; height: 28px; background: #0f3460; margin: 0 4px; flex-shrink: 0; }
    .btn {
      padding: 5px 13px;
      border: 1px solid #2a4a7a;
      background: #0f3460;
      color: #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: inherit;
      transition: background 0.12s, border-color 0.12s;
      white-space: nowrap;
      user-select: none;
    }
    .btn:hover  { background: #1a4a8a; border-color: #a8d8ea; color: #fff; }
    .btn.active { background: #e94560; border-color: #e94560; color: #fff; }
    .btn.dl     { background: transparent; border-color: #e94560; color: #e94560; }
    .btn.dl:hover { background: #e94560; color: #fff; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    select {
      background: #0f3460;
      border: 1px solid #2a4a7a;
      color: #eee;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
    }
    select:focus { outline: 1px solid #a8d8ea; }
    input[type="color"] {
      padding: 2px 3px; width: 38px; height: 30px;
      border: 1px solid #2a4a7a; border-radius: 6px;
      background: #0f3460; cursor: pointer;
    }
    .lbl { font-size: 0.72rem; color: #778; white-space: nowrap; }

    /* ── Viewer ──────────────────────────────────────────────────────── */
    #viewer {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      gap: 28px;
    }
    #empty { margin-top: 100px; text-align: center; color: #555; }
    #empty h2 { font-size: 1.4rem; margin-bottom: 8px; color: #666; }
    #empty p  { font-size: 0.9rem; }

    /* ── Per-page layout ─────────────────────────────────────────────── */
    .page-group  { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; }
    .page-header { display: flex; align-items: center; gap: 4px; }
    .page-lbl    { font-size: 0.7rem; color: #556; margin-right: 2px; }

    .pg-btn {
      padding: 1px 7px;
      border: 1px solid #2a4a7a;
      background: #0f3460;
      color: #aaa;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: inherit;
      line-height: 1.7;
      user-select: none;
      transition: background 0.12s;
    }
    .pg-btn:hover { background: #1a4a8a; color: #fff; border-color: #a8d8ea; }
    .pg-btn.danger       { color: #e94560; border-color: #e94560; }
    .pg-btn.danger:hover { background: #e94560; color: #fff; }

    /* ── Page canvas stack ───────────────────────────────────────────── */
    .page-wrap { position: relative; box-shadow: 0 6px 24px rgba(0,0,0,0.6); overflow: hidden; }
    .pdf-c     { display: block; }
    .fab-hold  { position: absolute; top: 0; left: 0; }

    /* cursor in placement modes */
    body.mode-text  .upper-canvas,
    body.mode-image .upper-canvas { cursor: crosshair !important; }

    /* ── Spinner ─────────────────────────────────────────────────────── */
    #spinner { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 999; align-items: center; justify-content: center; }
    #spinner.on { display: flex; }
    #spin-box { background: #16213e; border: 1px solid #0f3460; border-radius: 10px; padding: 20px 40px; color: #a8d8ea; font-size: 1rem; }
  </style>
</head>
<body class="mode-select">

<!-- ── Toolbar ─────────────────────────────────────────────────────────── -->
<div id="toolbar">
  <button class="btn" onclick="document.getElementById('ipdf').click()">Upload PDF</button>
  <input id="ipdf" type="file" accept=".pdf" style="display:none">

  <div class="sep"></div>

  <button class="btn active" id="b-sel"  onclick="setMode('select')">Select</button>
  <button class="btn"        id="b-txt"  onclick="setMode('text')">Add Text</button>
  <button class="btn"        id="b-img"  onclick="document.getElementById('iimg').click()">Add Image</button>
  <input id="iimg" type="file" accept="image/png,image/jpeg,image/gif,image/webp" style="display:none">

  <div class="sep"></div>

  <span class="lbl">Font</span>
  <select id="s-font">
    <option value="Helvetica">Helvetica</option>
    <option value="Arial">Arial</option>
    <option value="Times New Roman">Times New Roman</option>
    <option value="Georgia">Georgia</option>
    <option value="Courier New">Courier New</option>
  </select>

  <span class="lbl">Size</span>
  <select id="s-size">
    <option>8</option><option>10</option><option>12</option>
    <option selected>14</option><option>16</option><option>18</option>
    <option>24</option><option>32</option><option>48</option>
  </select>

  <span class="lbl">Color</span>
  <input id="s-color" type="color" value="#000000">

  <button class="btn" id="b-bold" onclick="toggleStyle('bold')"><b>B</b></button>
  <button class="btn" id="b-ital" onclick="toggleStyle('italic')"><i>I</i></button>

  <div class="sep"></div>

  <button class="btn" onclick="deleteSelected()">Delete</button>

  <div style="flex:1"></div>

  <button class="btn dl" id="b-dl" onclick="exportPDF()" disabled>Download PDF</button>
</div>

<!-- ── Viewer ──────────────────────────────────────────────────────────── -->
<div id="viewer">
  <div id="empty"><h2>No PDF loaded</h2><p>Click "Upload PDF" to get started</p></div>
</div>

<!-- ── Spinner ─────────────────────────────────────────────────────────── -->
<div id="spinner"><div id="spin-box">Processing…</div></div>

<!-- ── Libraries ───────────────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── state ──────────────────────────────────────────────────────────────────
let pdfBytes  = null;
let pdfJsDoc  = null;   // PDF.js doc — kept alive so pages can be re-rendered on rotate
let pages     = [];     // { scale, rotation } per page
let fcs       = [];     // Fabric.Canvas per page

let mode      = 'select';
let pendingImg = null;

// text style state
let tFont = 'Helvetica', tSize = 14, tColor = '#000000';
let tBold = false, tItalic = false;

// ── mode ───────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.body.className = 'mode-' + m;
  document.getElementById('b-sel').classList.toggle('active', m === 'select');
  document.getElementById('b-txt').classList.toggle('active', m === 'text');
  document.getElementById('b-img').classList.toggle('active', m === 'image');
  fcs.forEach(c => { c.selection = (m === 'select'); });
}

// ── PDF upload ─────────────────────────────────────────────────────────────
document.getElementById('ipdf').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  spin(true);
  try {
    pdfBytes = new Uint8Array(await file.arrayBuffer());
    await renderPDF();
  } catch (err) { alert('Failed to load PDF: ' + err.message); console.error(err); }
  spin(false);
});

// ── render all pages ───────────────────────────────────────────────────────
async function renderPDF() {
  fcs.forEach(c => c.dispose()); fcs = []; pages = [];
  document.getElementById('viewer').innerHTML = '';

  // Pass a copy to PDF.js — it transfers the ArrayBuffer to its worker (detaching the original).
  // Keeping pdfBytes intact lets pdf-lib read it on export.
  pdfJsDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice() }).promise;

  for (let i = 0; i < pdfJsDoc.numPages; i++) {
    pages.push({ scale: 1.5, rotation: 0 });
    const wrap = await buildPageDOM(i);

    // per-page header with rotate buttons
    const header  = el('div', { className: 'page-header' });
    const lbl     = el('span', { className: 'page-lbl', textContent: 'Page ' + (i + 1) });
    const btnCCW = el('button', { className: 'pg-btn', textContent: '↺', title: 'Rotate left' });
    const btnCW  = el('button', { className: 'pg-btn', textContent: '↻', title: 'Rotate right' });

    ;(idx => {
      btnCCW.onclick = () => rotatePage(idx, 'ccw');
      btnCW.onclick  = () => rotatePage(idx, 'cw');
    })(i);

    header.append(lbl, btnCCW, btnCW);

    const group = el('div', { className: 'page-group' });
    group.appendChild(header);
    group.appendChild(wrap);
    document.getElementById('viewer').appendChild(group);
  }

  document.getElementById('b-dl').disabled = false;
  setMode('select');
}

// ── build one page's DOM + Fabric canvas ───────────────────────────────────
async function buildPageDOM(idx) {
  const pg   = await pdfJsDoc.getPage(idx + 1);
  const { scale, rotation } = pages[idx];
  const vp   = pg.getViewport({ scale, rotation });
  const W    = Math.floor(vp.width);
  const H    = Math.floor(vp.height);

  const wrap = el('div', { className: 'page-wrap' });
  const pdfC = el('canvas', { className: 'pdf-c', id: 'pdfC-' + idx, width: W, height: H });
  const hold = el('div', { className: 'fab-hold' });
  const fabC = el('canvas', { id: 'fc' + idx, width: W, height: H });

  wrap.style.width  = W + 'px';
  wrap.style.height = H + 'px';
  hold.appendChild(fabC);
  wrap.appendChild(pdfC);
  wrap.appendChild(hold);

  await pg.render({ canvasContext: pdfC.getContext('2d'), viewport: vp }).promise;

  const fc = new fabric.Canvas('fc' + idx, {
    width: W, height: H,
    selection: true,
    preserveObjectStacking: true,
  });
  fcs[idx] = fc;
  attachEvents(fc, idx);
  return wrap;
}

// ── rotate a page 90° and re-render ───────────────────────────────────────
async function rotatePage(idx, dir) {
  pages[idx].rotation = ((pages[idx].rotation) + (dir === 'cw' ? 90 : -90) + 360) % 360;
  await rerenderPage(idx);
}

// ── re-render a single page in place (after rotation) ─────────────────────
async function rerenderPage(idx) {
  // Fresh PDF.js doc each time — reusing the same doc across multiple rotations
  // causes PDF.js internal render-state to get stuck on subsequent pages.
  pdfJsDoc = await pdfjsLib.getDocument({ data: pdfBytes.slice() }).promise;
  const pg = await pdfJsDoc.getPage(idx + 1);
  const { scale, rotation } = pages[idx];
  const vp = pg.getViewport({ scale, rotation });
  const W  = Math.floor(vp.width);
  const H  = Math.floor(vp.height);

  // re-draw PDF background
  const pdfC = document.getElementById('pdfC-' + idx);
  pdfC.width = W; pdfC.height = H;
  await pg.render({ canvasContext: pdfC.getContext('2d'), viewport: vp }).promise;

  // resize page-wrap wrapper
  const wrap = pdfC.closest('.page-wrap');
  wrap.style.width = W + 'px'; wrap.style.height = H + 'px';

  // resize & clear Fabric overlay
  const fc = fcs[idx];
  fc.setWidth(W); fc.setHeight(H);
  fc.clear();
  fc.renderAll();
}

// ── per-canvas event wiring ────────────────────────────────────────────────
function attachEvents(fc, idx) {
  fc.on('mouse:down', e => {
    // ── place text ────────────────────────────────────────────────────
    if (mode === 'text') {
      if (e.target) { setMode('select'); return; }
      const p   = fc.getPointer(e.e);
      const obj = new fabric.IText('Text', {
        left: p.x, top: p.y,
        fontFamily: tFont, fontSize: tSize, fill: tColor,
        fontWeight: tBold   ? 'bold'   : 'normal',
        fontStyle:  tItalic ? 'italic' : 'normal',
        lineHeight: 1.2, editable: true,
      });
      fc.add(obj);
      fc.setActiveObject(obj);
      obj.enterEditing(); obj.selectAll();
      fc.renderAll();
      setMode('select');

    // ── place image ───────────────────────────────────────────────────
    } else if (mode === 'image' && pendingImg) {
      if (e.target) { setMode('select'); return; }
      const p = fc.getPointer(e.e);
      const src = pendingImg; pendingImg = null;
      fabric.Image.fromURL(src, img => {
        const maxW = fc.width * 0.5;
        if (img.width > maxW) { const r = maxW / img.width; img.scaleX = r; img.scaleY = r; }
        img.set({ left: p.x, top: p.y });
        img.imageData = src;
        fc.add(img); fc.setActiveObject(img); fc.renderAll();
      });
      setMode('select');
    }
  });

  fc.on('selection:created', e => syncToolbar(e.selected[0]));
  fc.on('selection:updated', e => syncToolbar(e.selected[0]));
}

// ── sync toolbar from a selected object ───────────────────────────────────
function syncToolbar(obj) {
  if (!obj || obj.type !== 'i-text') return;
  document.getElementById('s-font').value  = obj.fontFamily || tFont;
  document.getElementById('s-size').value  = String(obj.fontSize || tSize);
  document.getElementById('s-color').value = toHex(obj.fill) || '#000000';
  tBold   = obj.fontWeight === 'bold';
  tItalic = obj.fontStyle  === 'italic';
  document.getElementById('b-bold').classList.toggle('active', tBold);
  document.getElementById('b-ital').classList.toggle('active', tItalic);
}

// ── toolbar style controls ─────────────────────────────────────────────────
document.getElementById('s-font').addEventListener('change', e => {
  tFont = e.target.value; applyToActive(o => o.set('fontFamily', tFont));
});
document.getElementById('s-size').addEventListener('change', e => {
  tSize = parseInt(e.target.value); applyToActive(o => o.set('fontSize', tSize));
});
document.getElementById('s-color').addEventListener('input', e => {
  tColor = e.target.value; applyToActive(o => o.set('fill', tColor));
});

function toggleStyle(type) {
  if (type === 'bold') {
    tBold = !tBold;
    document.getElementById('b-bold').classList.toggle('active', tBold);
    applyToActive(o => o.set('fontWeight', tBold ? 'bold' : 'normal'));
  } else {
    tItalic = !tItalic;
    document.getElementById('b-ital').classList.toggle('active', tItalic);
    applyToActive(o => o.set('fontStyle', tItalic ? 'italic' : 'normal'));
  }
}

function applyToActive(fn) {
  for (const fc of fcs) {
    const o = fc.getActiveObject();
    if (o) { fn(o); fc.renderAll(); break; }
  }
}

// ── delete selected object ─────────────────────────────────────────────────
function deleteSelected() {
  for (const fc of fcs) {
    const o = fc.getActiveObject();
    if (o) { fc.remove(o); fc.renderAll(); break; }
  }
}

// ── image file input ───────────────────────────────────────────────────────
document.getElementById('iimg').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';
  const r = new FileReader();
  r.onload = ev => { pendingImg = ev.target.result; setMode('image'); };
  r.readAsDataURL(file);
});

// ── export / download ──────────────────────────────────────────────────────
async function exportPDF() {
  if (!pdfBytes) return;
  spin(true);
  try {
    const { PDFDocument, StandardFonts, rgb, degrees } = PDFLib;
    const doc      = await PDFDocument.load(pdfBytes);
    const pdfPages = doc.getPages();

    for (let i = 0; i < fcs.length; i++) {
      const fc    = fcs[i];
      const pdfPg = pdfPages[i];
      const { scale, rotation } = pages[i];
      const pH    = pdfPg.getHeight();

      // ── rotation ───────────────────────────────────────────────────
      if (rotation) pdfPg.setRotation(degrees(rotation));

      // ── overlay objects ────────────────────────────────────────────
      for (const obj of fc.getObjects()) {

        if (obj.type === 'i-text' || obj.type === 'text') {
          const font  = await doc.embedFont(resolveFont(obj.fontFamily, obj.fontWeight, obj.fontStyle));
          const size  = (obj.fontSize || 14) / scale;
          const lineH = size * (obj.lineHeight || 1.2);
          const lines = (obj.text || '').split('\n');
          const pdfX  = obj.left / scale;
          const pdfY0 = pH - (obj.top + obj.fontSize * 0.95) / scale;
          const rot   = degrees(-(obj.angle || 0));
          const color = hexToRgb(obj.fill || '#000000');
          lines.forEach((line, li) => {
            if (!line) return;
            pdfPg.drawText(line, { x: pdfX, y: pdfY0 - li * lineH, size, font, color, rotate: rot });
          });
        }

        if (obj.type === 'image') {
          const src = obj.imageData || (obj._element && obj._element.src);
          if (!src || !src.startsWith('data:')) continue;
          const bytes = dataURLToBytes(src);
          const isPNG = src.startsWith('data:image/png');
          let embedded;
          try { embedded = isPNG ? await doc.embedPng(bytes) : await doc.embedJpg(bytes); }
          catch (_) { try { embedded = await doc.embedPng(bytes); } catch (_) { continue; } }
          const w = (obj.width  * obj.scaleX) / scale;
          const h = (obj.height * obj.scaleY) / scale;
          pdfPg.drawImage(embedded, {
            x: obj.left / scale, y: pH - (obj.top / scale) - h,
            width: w, height: h,
            rotate: degrees(-(obj.angle || 0)),
          });
        }
      }
    }

    const out  = await doc.save();
    const link = Object.assign(document.createElement('a'), {
      href:     URL.createObjectURL(new Blob([out], { type: 'application/pdf' })),
      download: 'edited.pdf',
    });
    link.click();
    setTimeout(() => URL.revokeObjectURL(link.href), 5000);
  } catch (err) { alert('Export failed: ' + err.message); console.error(err); }
  spin(false);
}

// ── helpers ────────────────────────────────────────────────────────────────
function resolveFont(family = '', weight = '', style = '') {
  const { StandardFonts } = PDFLib;
  const b  = weight === 'bold';
  const it = style  === 'italic' || style === 'oblique';
  const f  = family.toLowerCase();
  if (f.includes('times') || f.includes('georgia') || f.includes('serif')) {
    if (b && it) return StandardFonts.TimesBoldItalic;
    if (b)       return StandardFonts.TimesBold;
    if (it)      return StandardFonts.TimesRomanItalic;
    return StandardFonts.TimesRoman;
  }
  if (f.includes('courier') || f.includes('mono')) {
    if (b && it) return StandardFonts.CourierBoldOblique;
    if (b)       return StandardFonts.CourierBold;
    if (it)      return StandardFonts.CourierOblique;
    return StandardFonts.Courier;
  }
  if (b && it) return StandardFonts.HelveticaBoldOblique;
  if (b)       return StandardFonts.HelveticaBold;
  if (it)      return StandardFonts.HelveticaOblique;
  return StandardFonts.Helvetica;
}

function hexToRgb(hex) {
  const h = toHex(hex);
  if (!h || h.length < 7) return PDFLib.rgb(0, 0, 0);
  return PDFLib.rgb(
    parseInt(h.slice(1, 3), 16) / 255,
    parseInt(h.slice(3, 5), 16) / 255,
    parseInt(h.slice(5, 7), 16) / 255,
  );
}

function toHex(color) {
  if (!color) return '#000000';
  if (/^#[0-9a-f]{6}$/i.test(color)) return color;
  const ctx = document.createElement('canvas').getContext('2d');
  ctx.fillStyle = color;
  return ctx.fillStyle;
}

function dataURLToBytes(url) {
  const b64 = url.split(',')[1];
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

function spin(on) { document.getElementById('spinner').classList.toggle('on', on); }

function el(tag, props = {}) { return Object.assign(document.createElement(tag), props); }

function anyEditing() { return fcs.some(c => c.getObjects().some(o => o.isEditing)); }

// ── keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') setMode('select');
  if ((e.key === 'Delete' || e.key === 'Backspace') && !anyEditing()) {
    if (document.activeElement.tagName === 'INPUT' ||
        document.activeElement.tagName === 'SELECT') return;
    deleteSelected();
  }
});
</script>
</body>
</html>
